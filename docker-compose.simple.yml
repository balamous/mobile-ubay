services:
  # Base de données PostgreSQL standard (fiable)
  db:
    image: postgres:15-alpine
    container_name: ubay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintech_db
      POSTGRES_USER: fintech_admin
      POSTGRES_PASSWORD: fintech_password_2024
      POSTGRES_INITDB_ARGS: --auth-host=scram
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
      -c log_statement=all
      -c log_min_duration_statement=0
      -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

  # pgAdmin pour l'administration de la base de données
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ubay-pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ubay.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Redis pour le cache et les sessions
  redis:
    image: redis:7-alpine
    container_name: ubay-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Nginx comme reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ubay-nginx
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - default

  # API Gateway simple (Node.js)
  api:
    image: node:18-alpine
    container_name: ubay-api
    restart: unless-stopped
    depends_on:
      - db
      - redis
    working_dir: /app
    volumes:
      - ./api:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fintech_admin:fintech_password_2024@db:5432/fintech_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: votre-jwt-secret-personnalisé-ici
      API_PORT: 3000
    command:
      - sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  default:
    name: ubay-network
