services:
  # Base de données PostgreSQL (remplace Supabase DB)
  db:
    image: postgres:15-alpine
    container_name: ubay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintech_db
      POSTGRES_USER: fintech_admin
      POSTGRES_PASSWORD: fintech_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech_admin -d fintech_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin pour l'administration (remplace Supabase Studio)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ubay-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ubay.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Redis pour le cache
  redis:
    image: redis:7-alpine
    container_name: ubay-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # MinIO pour le stockage des fichiers
  minio:
    image: minio/minio:latest
    container_name: ubay-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_DEFAULT_BUCKETS: ubay-documents
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # API REST simple (remplace PostgREST)
  api:
    image: node:18-alpine
    container_name: ubay-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    working_dir: /app
    volumes:
      - ./api:/app
      - /app/node_modules
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://fintech_admin:fintech_password_2024@db:5432/fintech_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: votre-jwt-secret-personnalisé-ici
      API_PORT: 3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: ubay-documents
      MINIO_USE_SSL: false
      MINIO_PUBLIC_URL: http://localhost:9000
    command: >
      sh -c "
        if [ ! -f node_modules ]; then
          npm install --no-optional --no-audit --no-fund;
        fi;
        node server-simple.js
      "

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  minio_data:

networks:
  default:
    name: ubay-network
